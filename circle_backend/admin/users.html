<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Circle Admin — Users</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
</head>
<body>

<div class="admin-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg></div>
      <span class="sidebar-brand-name">Circle</span>
      <span class="sidebar-brand-badge">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-link" href="dashboard.html" data-page="dashboard">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a class="nav-link" href="users.html" data-page="users">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Users</a>
      <a class="nav-link" href="posts.html" data-page="posts">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Posts</a>
      <a class="nav-link" href="reports.html" data-page="reports">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Reports</a>
      <div class="nav-section-label" style="margin-top:8px">Account</div>
      <a class="nav-link" href="settings.html" data-page="settings">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
      <a class="nav-link" href="#" onclick="adminLogout()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar" id="admin-avatar">A</div>
        <div><div class="admin-name" id="admin-name">Admin</div><div class="admin-role">Super Admin</div></div>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <div class="topbar">
      <button class="icon-btn mobile-menu-btn" id="mobile-menu-btn">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title">User <span>Management</span></div>
    </div>

    <div class="content">
      <div class="page-header">
        <div><h1>Users</h1><p>Manage all registered users</p></div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <div class="table-header-title" id="user-count">Loading…</div>
          <div class="search-box">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Search name or email…" oninput="onSearch()"/>
          </div>
        </div>

        <div id="table-body">
          <div class="empty-state"><div class="spinner dark" style="margin:0 auto 12px"></div><p>Loading users…</p></div>
        </div>

        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
if (!requireAdminAuth()) throw new Error();
initAdminPage('users');

let currentPage = 1;
let searchTimer = null;
const PER_PAGE  = 20;

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; loadUsers(); }, 300);
}

async function loadUsers() {
  const q = document.getElementById('search-input').value.trim();
  document.getElementById('table-body').innerHTML =
    '<div class="empty-state"><div class="spinner dark" style="margin:0 auto 12px"></div><p>Loading…</p></div>';
  try {
    const res = await adminApi('GET', `/users?search=${encodeURIComponent(q)}&page=${currentPage}`);
    const { users, total } = res.data;
    document.getElementById('user-count').textContent = `${formatNumber(total)} users`;
    renderTable(users);
    renderPagination('pagination', currentPage, total, PER_PAGE,
      `function(p){currentPage=p;loadUsers()}`);
  } catch (e) {
    showToast(e.message, 'error');
  }
}

function renderTable(users) {
  if (!users.length) {
    document.getElementById('table-body').innerHTML =
      `<div class="empty-state">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <h3>No users found</h3><p>Try adjusting your search</p></div>`;
    return;
  }
  document.getElementById('table-body').innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th><th>User</th><th>Email</th>
          <th>Posts</th><th>Followers</th><th>Status</th>
          <th>Joined</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>${users.map(u => userRow(u)).join('')}</tbody>
    </table>`;
}

function userRow(u) {
  const suspended = u.suspended == 1;
  return `<tr id="user-row-${u.id}">
    <td style="color:var(--txt3);font-size:12px">#${u.id}</td>
    <td>
      <div class="user-cell">
        ${avatarHtml(u.picture, u.name)}
        <div class="user-cell-name">${escHtml(u.name)}</div>
      </div>
    </td>
    <td style="color:var(--txt2)">${escHtml(u.email)}</td>
    <td>${formatNumber(u.postCount)}</td>
    <td>${formatNumber(u.followerCount)}</td>
    <td>
      <span class="badge ${suspended ? 'badge-rose' : 'badge-green'}">
        ${suspended ? 'Suspended' : 'Active'}
      </span>
    </td>
    <td style="color:var(--txt2);font-size:12px">${formatDate(u.joinDate)}</td>
    <td>
      <div class="actions">
        <button class="btn-action ${suspended ? 'success' : ''}"
          onclick="${suspended ? 'unsuspendUser' : 'suspendUser'}(${u.id}, this)">
          ${suspended ? 'Unsuspend' : 'Suspend'}
        </button>
        <button class="btn-action danger" onclick="deleteUser(${u.id})">Delete</button>
      </div>
    </td>
  </tr>`;
}

async function suspendUser(id, btn) {
  btn.disabled = true;
  try {
    await adminApi('PUT', `/users/${id}/suspend`);
    showToast('User suspended.', 'success');
    loadUsers();
  } catch (e) { showToast(e.message, 'error'); btn.disabled = false; }
}

async function unsuspendUser(id, btn) {
  btn.disabled = true;
  try {
    await adminApi('PUT', `/users/${id}/unsuspend`);
    showToast('User unsuspended.', 'success');
    loadUsers();
  } catch (e) { showToast(e.message, 'error'); btn.disabled = false; }
}

async function deleteUser(id) {
  const ok = await showConfirm(
    'Delete User',
    'This will permanently delete the user and all their posts, likes, and comments. This cannot be undone.',
    'Delete User'
  );
  if (!ok) return;
  try {
    await adminApi('DELETE', `/users/${id}`);
    showToast('User deleted.', 'success');
    document.getElementById(`user-row-${id}`)?.remove();
  } catch (e) { showToast(e.message, 'error'); }
}

loadUsers();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Circle Admin — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
      </div>
      <div>
        <span class="login-brand-name">Circle</span>
        <span class="login-brand-badge">Admin</span>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p>Sign in to your admin dashboard</p>

    <div class="login-error" id="login-error"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@circle.app" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<script src="admin.js"></script>
<script>
// If already logged in, skip login screen
if (getToken()) window.location.href = 'dashboard.html';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');

  errEl.classList.remove('show');
  if (!email || !password) {
    errEl.textContent = 'Email and password are required.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled    = true;
  btn.innerHTML   = '<span class="spinner"></span>';

  try {
    const res = await fetch('http://localhost:5000/api/admin/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.message || 'Login failed.';
      errEl.classList.add('show');
      return;
    }

    saveSession(data.data.token, data.data.admin);
    window.location.href = 'dashboard.html';
  } catch (e) {
    errEl.textContent = 'Cannot reach the server. Is it running?';
    errEl.classList.add('show');
  } finally {
    btn.disabled  = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>

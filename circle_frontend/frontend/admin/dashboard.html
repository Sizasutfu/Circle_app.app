<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Circle Admin — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="admin-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
      </div>
      <span class="sidebar-brand-name">Circle</span>
      <span class="sidebar-brand-badge">Admin</span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-link" href="dashboard.html" data-page="dashboard">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a class="nav-link" href="users.html" data-page="users">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Users
      </a>
      <a class="nav-link" href="posts.html" data-page="posts">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Posts
      </a>
      <a class="nav-link" href="reports.html" data-page="reports">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Reports
        <span class="nav-badge" id="reports-badge" style="display:none">0</span>
      </a>
      <div class="nav-section-label" style="margin-top:8px">Account</div>
      <a class="nav-link" href="settings.html" data-page="settings">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </a>
      <a class="nav-link" href="#" onclick="adminLogout()" data-page="">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar" id="admin-avatar">A</div>
        <div>
          <div class="admin-name"  id="admin-name">Admin</div>
          <div class="admin-role">Super Admin</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="admin-main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="icon-btn mobile-menu-btn" id="mobile-menu-btn">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title">Dashboard <span>Overview</span></div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="loadDashboard()" title="Refresh">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        </button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <div class="page-header">
        <div>
          <h1>Dashboard</h1>
          <p id="last-updated">Loading…</p>
        </div>
      </div>

      <!-- Stat Cards -->
      <div class="stats-grid" id="stats-grid">
        <!-- filled by JS -->
        <div class="stat-card"><div style="display:grid;place-items:center;height:80px"><div class="spinner dark"></div></div></div>
        <div class="stat-card"><div style="display:grid;place-items:center;height:80px"><div class="spinner dark"></div></div></div>
        <div class="stat-card"><div style="display:grid;place-items:center;height:80px"><div class="spinner dark"></div></div></div>
        <div class="stat-card"><div style="display:grid;place-items:center;height:80px"><div class="spinner dark"></div></div></div>
        <div class="stat-card"><div style="display:grid;place-items:center;height:80px"><div class="spinner dark"></div></div></div>
        <div class="stat-card"><div style="display:grid;place-items:center;height:80px"><div class="spinner dark"></div></div></div>
      </div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-card-title">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            User Growth (Last 30 Days)
          </div>
          <canvas id="userGrowthChart" height="200"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-card-title">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            Posts Per Day (Last 30 Days)
          </div>
          <canvas id="postsPerDayChart" height="200"></canvas>
        </div>
      </div>

    </div><!-- /content -->
  </div><!-- /admin-main -->
</div><!-- /admin-shell -->

<script src="admin.js"></script>
<script>
if (!requireAdminAuth()) throw new Error('Not authenticated');
initAdminPage('dashboard');

// Chart.js defaults
Chart.defaults.color          = '#8892a4';
Chart.defaults.borderColor    = '#2a3347';
Chart.defaults.font.family    = 'Inter, sans-serif';

let userChart, postsChart;

async function loadDashboard() {
  try {
    // Load stats and chart data in parallel
    const [statsRes, chartsRes] = await Promise.all([
      adminApi('GET', '/stats'),
      adminApi('GET', '/charts'),
    ]);
    renderStats(statsRes.data);
    renderCharts(chartsRes.data);
    document.getElementById('last-updated').textContent =
      'Last updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

function renderStats(s) {
  const defs = [
    { key: 'totalUsers',     label: 'Total Users',     icon: 'users',    color: 'purple' },
    { key: 'totalPosts',     label: 'Total Posts',     icon: 'posts',    color: 'blue'   },
    { key: 'totalReposts',   label: 'Total Reposts',   icon: 'reposts',  color: 'green'  },
    { key: 'totalComments',  label: 'Total Comments',  icon: 'comments', color: 'amber'  },
    { key: 'newUsersToday',  label: 'New Users Today', icon: 'new',      color: 'green'  },
    { key: 'pendingReports', label: 'Pending Reports', icon: 'reports',  color: 'rose'   },
  ];
  const icons = {
    users:    `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>`,
    posts:    `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
    reposts:  `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>`,
    comments: `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
    new:      `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>`,
    reports:  `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  };

  // Update reports badge in sidebar
  const badge = document.getElementById('reports-badge');
  if (badge) {
    badge.textContent = s.pendingReports;
    badge.style.display = s.pendingReports > 0 ? 'grid' : 'none';
  }

  document.getElementById('stats-grid').innerHTML = defs.map(d => `
    <div class="stat-card">
      <div class="stat-card-top">
        <div class="stat-icon ${d.color}">${icons[d.icon]}</div>
      </div>
      <div class="stat-value">${formatNumber(s[d.key])}</div>
      <div class="stat-label">${d.label}</div>
    </div>`).join('');
}

function buildChartData(rows, days = 30) {
  // Fill gaps — ensure every day in the last 30 days has a value
  const map = {};
  rows.forEach(r => { map[r.date?.slice(0,10) || r.date] = r.count; });
  const labels = [], data = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    labels.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
    data.push(map[key] || 0);
  }
  return { labels, data };
}

function renderCharts({ userGrowth, postsPerDay }) {
  const ug = buildChartData(userGrowth);
  const pp = buildChartData(postsPerDay);

  const chartOpts = (color) => ({
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: '#2a3347' }, ticks: { maxTicksLimit: 8 } },
      y: { grid: { color: '#2a3347' }, beginAtZero: true, ticks: { precision: 0 } },
    },
  });

  if (userChart) userChart.destroy();
  userChart = new Chart(document.getElementById('userGrowthChart'), {
    type: 'line',
    data: {
      labels: ug.labels,
      datasets: [{
        data: ug.data,
        borderColor: '#6c63ff',
        backgroundColor: 'rgba(108,99,255,.12)',
        borderWidth: 2.5,
        pointRadius: 3, pointHoverRadius: 5,
        tension: 0.4, fill: true,
      }],
    },
    options: chartOpts('#6c63ff'),
  });

  if (postsChart) postsChart.destroy();
  postsChart = new Chart(document.getElementById('postsPerDayChart'), {
    type: 'bar',
    data: {
      labels: pp.labels,
      datasets: [{
        data: pp.data,
        backgroundColor: 'rgba(56,189,248,.25)',
        borderColor: '#38bdf8',
        borderWidth: 2,
        borderRadius: 4,
      }],
    },
    options: chartOpts('#38bdf8'),
  });
}

loadDashboard();
</script>
</body>
</html>

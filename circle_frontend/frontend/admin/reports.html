<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Circle Admin — Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
</head>
<body>

<div class="admin-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg></div>
      <span class="sidebar-brand-name">Circle</span>
      <span class="sidebar-brand-badge">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-link" href="dashboard.html" data-page="dashboard">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a class="nav-link" href="users.html" data-page="users">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Users</a>
      <a class="nav-link" href="posts.html" data-page="posts">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Posts</a>
      <a class="nav-link" href="reports.html" data-page="reports">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Reports</a>
      <div class="nav-section-label" style="margin-top:8px">Account</div>
      <a class="nav-link" href="settings.html" data-page="settings">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
      <a class="nav-link" href="#" onclick="adminLogout()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar" id="admin-avatar">A</div>
        <div><div class="admin-name" id="admin-name">Admin</div><div class="admin-role">Super Admin</div></div>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <div class="topbar">
      <button class="icon-btn mobile-menu-btn" id="mobile-menu-btn">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title">Reports <span>Queue</span></div>
    </div>

    <div class="content">
      <div class="page-header">
        <div><h1>Reports</h1><p>Review user-submitted reports</p></div>
        <!-- Status filter tabs -->
        <div style="display:flex;gap:8px">
          <button class="btn-action active" id="tab-pending"  onclick="switchTab('pending')"  style="background:var(--accent-bg);color:var(--accent);border-color:var(--accent)">Pending</button>
          <button class="btn-action"        id="tab-resolved" onclick="switchTab('resolved')">Resolved</button>
          <button class="btn-action"        id="tab-ignored"  onclick="switchTab('ignored')">Ignored</button>
        </div>
      </div>

      <div id="reports-container">
        <div class="empty-state"><div class="spinner dark" style="margin:0 auto 12px"></div><p>Loading reports…</p></div>
      </div>
      <div class="pagination" id="pagination" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-top:0;border-top:none;padding:14px 20px"></div>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
if (!requireAdminAuth()) throw new Error();
initAdminPage('reports');

let currentStatus = 'pending';
let currentPage   = 1;
const PER_PAGE    = 20;

function switchTab(status) {
  currentStatus = status; currentPage = 1;
  ['pending','resolved','ignored'].forEach(s => {
    const btn = document.getElementById(`tab-${s}`);
    const active = s === status;
    btn.style.background    = active ? 'var(--accent-bg)' : '';
    btn.style.color         = active ? 'var(--accent)' : '';
    btn.style.borderColor   = active ? 'var(--accent)' : '';
  });
  loadReports();
}

async function loadReports() {
  document.getElementById('reports-container').innerHTML =
    '<div class="empty-state"><div class="spinner dark" style="margin:0 auto 12px"></div><p>Loading…</p></div>';
  try {
    const res = await adminApi('GET', `/reports?status=${currentStatus}&page=${currentPage}`);
    const { reports, total } = res.data;
    renderReports(reports, total);
    renderPagination('pagination', currentPage, total, PER_PAGE,
      `function(p){currentPage=p;loadReports()}`);
  } catch (e) { showToast(e.message, 'error'); }
}

function renderReports(reports, total) {
  if (!reports.length) {
    document.getElementById('reports-container').innerHTML =
      `<div class="empty-state" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);border-bottom:none">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        <h3>No ${currentStatus} reports</h3>
        <p>${currentStatus === 'pending' ? 'All clear! No reports need attention.' : 'Nothing here yet.'}</p>
      </div>`;
    return;
  }

  document.getElementById('reports-container').innerHTML =
    reports.map(r => reportCard(r)).join('');
}

function reportCard(r) {
  const isPending = currentStatus === 'pending';
  return `<div class="report-card" id="report-${r.id}">
    <div class="report-header">
      <div>
        <div style="font-size:13.5px;font-weight:700">
          Report #${r.id} — Post by <strong>${escHtml(r.authorName)}</strong>
        </div>
        <div class="report-meta">
          Reported by <strong>${escHtml(r.reporterName)}</strong>
          · ${formatDate(r.reportedAt)}
        </div>
      </div>
      <span class="badge ${r.status==='pending'?'badge-rose':r.status==='resolved'?'badge-green':'badge-grey'}">
        ${r.status}
      </span>
    </div>

    <div class="report-reason">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14" style="display:inline;vertical-align:middle;margin-right:6px"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Reason: ${escHtml(r.reason)}
    </div>

    ${r.postText || r.postImage ? `
    <div class="report-post-preview">
      <div class="report-post-author">Post content:</div>
      ${r.postText ? `<div>${escHtml(r.postText)}</div>` : ''}
      ${r.postImage ? `<img src="${escHtml(r.postImage)}" style="max-height:120px;border-radius:8px;margin-top:10px;object-fit:cover" loading="lazy" onerror="this.remove()"/>` : ''}
    </div>` : '<div class="report-post-preview" style="color:var(--txt3);font-size:13px">Post no longer exists.</div>'}

    ${isPending ? `
    <div class="actions">
      <button class="btn-action danger"   onclick="deleteReportPost(${r.id}, ${r.postId})">Delete Post</button>
      <button class="btn-action success"  onclick="resolveReport(${r.id})">Mark Resolved</button>
      <button class="btn-action"          onclick="ignoreReport(${r.id})">Ignore</button>
    </div>` : ''}
  </div>`;
}

async function deleteReportPost(reportId, postId) {
  const ok = await showConfirm('Delete Reported Post', 'This will delete the post and resolve the report.', 'Delete Post');
  if (!ok) return;
  try {
    if (postId) await adminApi('DELETE', `/posts/${postId}`);
    await adminApi('PUT', `/reports/${reportId}/resolve`);
    showToast('Post deleted and report resolved.', 'success');
    document.getElementById(`report-${reportId}`)?.remove();
  } catch (e) { showToast(e.message, 'error'); }
}

async function resolveReport(id) {
  try {
    await adminApi('PUT', `/reports/${id}/resolve`);
    showToast('Report resolved.', 'success');
    document.getElementById(`report-${id}`)?.remove();
  } catch (e) { showToast(e.message, 'error'); }
}

async function ignoreReport(id) {
  try {
    await adminApi('PUT', `/reports/${id}/ignore`);
    showToast('Report ignored.', 'success');
    document.getElementById(`report-${id}`)?.remove();
  } catch (e) { showToast(e.message, 'error'); }
}

loadReports();
</script>
</body>
</html>
